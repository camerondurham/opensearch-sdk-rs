name: live-hello

permissions:
  contents: read

on:
  pull_request:
    paths:
      - ".github/workflows/live-hello.yml"
      - "Cargo.toml"
      - "build.rs"
      - "justfile"
      - "scripts/live_hello.sh"
      - "src/**"
      - "tests/live_hello.rs"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/live-hello.yml"
      - "Cargo.toml"
      - "build.rs"
      - "justfile"
      - "scripts/live_hello.sh"
      - "src/**"
      - "tests/live_hello.rs"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  live-hello:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out opensearch-sdk-rs
        uses: actions/checkout@v4

      - name: Check out OpenSearch
        uses: actions/checkout@v4
        with:
          repository: opensearch-project/OpenSearch
          path: OpenSearch

      - name: Install Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run fast unit and bin tests
        env:
          OPENSEARCH_DIR: ${{ github.workspace }}/OpenSearch
        run: cargo test --lib --bins

      - name: Run live OpenSearch hello harness
        env:
          OPENSEARCH_DIR: ${{ github.workspace }}/OpenSearch
        run: cargo test --test live_hello -- --ignored --nocapture
